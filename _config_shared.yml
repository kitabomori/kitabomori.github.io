title: Kitabomori
email: kitabomori@gmail.com
baseurl: ""
url: "https://kitabomori.github.io"
# root_url has no language subpath — used to build the alternate-language
# (hreflang) links, which always point at the *other* language's copy of
# the current page. Kept separate from `url` because `url` itself is
# overridden per-language below (see _config_en.yml / _config_ur.yml) so
# that the sitemap, canonical tags, and Open Graph URLs are correct for
# each language build.
root_url: "https://kitabomori.github.io"
collections_dir: _collections

# Default YouTube channel link, used as a fallback on posts that don't yet
# have their own per-post/per-language audio link (youtube_en / youtube_ur
# in the post's front matter). Update here to change the site-wide default,
# or override per post by setting youtube_en / youtube_ur in that post's
# front matter.
youtube_channel: "https://www.youtube.com/channel/UCKPb3SXn6wcDjMbobIFKxbg"

plugins:
  - jekyll-sitemap

# Collections – shared across both languages
collections:
  articles:
    output: true
    permalink: /articles/:name/
  letters:
    output: true
    permalink: /:collection/:name/
  reviews:
    output: true
    permalink: /reviews/:name/
  reflections:
    output: true
    permalink: /creative-writing/reflection/:name/
  calls:
    output: true
    permalink: /:collection/:name/
  short_stories:
    output: true
    permalink: /creative-writing/short-stories/:name/
  poetry:
    output: true
    permalink: /creative-writing/poetry/:name/
  dialogues:
    output: true
    permalink: /creative-writing/dialogues/:name/
  satire:
    output: true
    permalink: /creative-writing/satire/:name/
  nonfiction:
    output: true
    permalink: /creative-writing/nonfiction/:name/

  events:
    output: true
    permalink: /events/:name/
  diary:
    output: true
    permalink: /diary/:name/

# Default layouts
defaults:
  - scope:
      path: ""
      type: articles
    values:
      layout: post
  - scope:
      path: ""
      type: letters
    values:
      layout: post
  - scope:
      path: ""
      type: reviews
    values:
      layout: post
  - scope:
      path: ""
      type: reflections
    values:
      layout: post
  - scope:
      path: ""
      type: calls
    values:
      layout: post
  - scope:
      path: ""
      type: short_stories
    values:
      layout: post
  - scope:
      path: ""
      type: poetry
    values:
      layout: post
  - scope:
      path: ""
      type: dialogues
    values:
      layout: post
  - scope:
      path: ""
      type: satire
    values:
      layout: post
  - scope:
      path: ""
      type: nonfiction
    values:
      layout: post

  - scope:
      path: ""
      type: events
    values:
      layout: post
  - scope:
      path: ""
      type: diary
    values:
      layout: post

markdown: kramdown
highlighter: rouge
exclude:
  - index.html
  - README.md
  - Gemfile
  - package.json
  - package-lock.json
  - node_modules
  - tailwind.config.js
  - postcss.config.js