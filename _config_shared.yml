title: Kitabomori
email: kitabomori@gmail.com
baseurl: ""
url: "https://kitabomori.github.io"
collections_dir: _collections

# Default YouTube channel link, used as a fallback on posts that don't yet
# have their own per-post/per-language audio link (youtube_en / youtube_ur
# in the post's front matter). Update here to change the site-wide default,
# or override per post by setting youtube_en / youtube_ur in that post's
# front matter.
youtube_channel: "https://www.youtube.com/channel/UCKPb3SXn6wcDjMbobIFKxbg"

plugins:
  - jekyll-sitemap

# Collections – shared across both languages
collections:
  blogs:
    output: true
    permalink: /:collection/:name/
  opeds:
    output: true
    permalink: /:collection/:name/
  letters:
    output: true
    permalink: /:collection/:name/
  reviews:
    output: true
    permalink: /reviews/:name/
  reflections:
    output: true
    permalink: /:collection/:name/
  calls:
    output: true
    permalink: /:collection/:name/
  fiction_stories:
    output: true
    permalink: /creative-writing/fiction-stories/:name/
  poetry:
    output: true
    permalink: /creative-writing/poetry/:name/
  what_i_saw:
    output: true
    permalink: /creative-writing/what-i-saw/:name/
  events:
    output: true
    permalink: /events/:name/
  diary:
    output: true
    permalink: /diary/:name/

# Default layouts
defaults:
  - scope:
      path: ""
      type: blogs
    values:
      layout: post
  - scope:
      path: ""
      type: opeds
    values:
      layout: post
  - scope:
      path: ""
      type: letters
    values:
      layout: post
  - scope:
      path: ""
      type: reviews
    values:
      layout: post
  - scope:
      path: ""
      type: reflections
    values:
      layout: post
  - scope:
      path: ""
      type: calls
    values:
      layout: post
  - scope:
      path: ""
      type: fiction_stories
    values:
      layout: post
  - scope:
      path: ""
      type: poetry
    values:
      layout: post
  - scope:
      path: ""
      type: what_i_saw
    values:
      layout: post
  - scope:
      path: ""
      type: events
    values:
      layout: post
  - scope:
      path: ""
      type: diary
    values:
      layout: post

markdown: kramdown
highlighter: rouge
exclude:
  - index.html
  - README.md
  - Gemfile
  - package.json
  - package-lock.json
  - node_modules
  - tailwind.config.js
  - postcss.config.js