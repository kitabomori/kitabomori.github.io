<!-- ============================================================
     head.html – <head> block for all pages
     Sets charset, viewport, Google Fonts, Tailwind CSS, theme script,
     and all metadata. Called once from base.html.
     ============================================================ -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Page title: prefer page-specific title, fall back to site title -->
<title>
  {% if page.title_en %}
    {% if site.lang == 'en' %}{{ page.title_en }} – Kitabomori{% else %}{{ page.title_ur }} – کتابومری{% endif %}
  {% else %}
    Kitabomori – Promoting reading through evidence-based research
  {% endif %}
</title>

<!-- Meta description -->
<meta name="description" content="{% if site.lang == 'en' %}{{ page.description_en | default: site.tagline }}{% else %}{{ page.description_ur | default: site.tagline }}{% endif %}">

<!-- Open Graph -->
<meta property="og:title" content="{% if site.lang == 'en' %}{{ page.title_en | default: 'Kitabomori' }}{% else %}{{ page.title_ur | default: 'کتابومری' }}{% endif %}">
<meta property="og:description" content="{% if site.lang == 'en' %}{{ page.description_en | default: site.tagline }}{% else %}{{ page.description_ur | default: site.tagline }}{% endif %}">
<meta property="og:type" content="website">

<!-- Google Fonts: Literata (English) + Noto Nastaliq Urdu (Urdu)
     Literata is a serif designed by Google specifically for comfortable
     on-screen long-form reading (it's the font behind Google Play Books),
     so it suits a reading-focused site better than a UI sans-serif.
     Loaded with display=swap for performance -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Literata:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Noto+Nastaliq+Urdu:wght@400;700&display=swap" rel="stylesheet">

<!-- Tailwind CSS (compiled by PostCSS build step) -->
<link rel="stylesheet" href="{{ site.baseurl }}/assets/css/main.css">

<!-- Theme script: runs before paint to prevent flash of wrong colour scheme -->
<script src="{{ site.baseurl }}/assets/js/theme.js"></script>

<!-- Favicon -->
<link rel="icon" href="{{ site.baseurl }}/assets/favicon.svg" type="image/svg+xml">
