---
layout: base
---
<!-- ============================================================
     page.html – layout for standard content pages.
     Wraps content in a centred container with page-title heading.
     ============================================================ -->
<div class="page-container">

  {% include page-decor.html %}

  <h1 class="page-title">
    {% if site.lang == 'ur' %}
      {{ page.title_ur | default: page.title }}
    {% else %}
      {{ page.title_en | default: page.title }}
    {% endif %}
  </h1>

  <div class="page-content">
    {{ content }}
  </div>

</div>
