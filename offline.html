<!DOCTYPE html>
<!--
  offline.html – Offline fallback page.
  Served by sw.js when the user is offline and requests a page that
  hasn't been cached yet. Deliberately plain and dependency-free (no
  external fonts/CSS) so it always loads instantly straight from the
  service worker cache, even with zero connectivity.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You're offline – Kitabomori</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #FBF8F2;
      color: #3a352c;
      font-family: Georgia, 'Times New Roman', serif;
      text-align: center;
      padding: 24px;
      box-sizing: border-box;
    }
    .card { max-width: 420px; }
    h1 {
      color: #009F93;
      font-size: 1.75rem;
      margin-bottom: 8px;
    }
    p { line-height: 1.6; margin-bottom: 24px; }
    button {
      background: #009F93;
      color: #fff;
      border: none;
      padding: 10px 22px;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      font-family: inherit;
    }
    button:hover { background: #00847a; }
  </style>
</head>
<body>
  <div class="card">
    <h1>You're offline</h1>
    <p>
      This page hasn't been saved for offline reading yet.<br>
      یہ صفحہ ابھی آف لائن پڑھنے کے لیے محفوظ نہیں ہوا۔
    </p>
    <p>Pages you've already visited on Kitabomori are still available offline.</p>
    <button onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
